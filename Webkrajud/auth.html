<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Krajood Craft</title>
    <meta name="description" content="เข้าสู่ระบบหรือสมัครสมาชิก Krajood Craft เพื่อเรียนรู้ศิลปะการสานกระจูด">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <!-- Animated Background -->
    <div class="auth-bg">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>
        <div class="bg-shape bg-shape-4"></div>
    </div>

    <div class="auth-container">
        <!-- Left Side - Branding -->
        <div class="auth-branding">
            <a href="index.html" class="auth-logo">
                <span class="logo-icon">🌾</span>
                Krajood Craft
            </a>
            <div class="branding-content">
                <h1>เรียนรู้ศิลปะ<br>การสานกระจูด</h1>
                <p>เข้าสู่ระบบเพื่อเข้าถึงคอร์สเรียนทั้งหมด พร้อมวิดีโอสอน step-by-step จากช่างผู้เชี่ยวชาญ</p>
                <div class="branding-features">
                    <div class="brand-feature">
                        <span class="brand-feature-icon">🎥</span>
                        <span>วิดีโอสอนคุณภาพสูง</span>
                    </div>
                    <div class="brand-feature">
                        <span class="brand-feature-icon">📚</span>
                        <span>คอร์สครบทุกระดับ</span>
                    </div>
                    <div class="brand-feature">
                        <span class="brand-feature-icon">🏆</span>
                        <span>เรียนรู้จากผู้เชี่ยวชาญ</span>
                    </div>
                </div>
            </div>
            <div class="branding-decor">
                <div class="decor-circle"></div>
                <div class="decor-circle decor-circle-2"></div>
            </div>
        </div>

        <!-- Right Side - Auth Form -->
        <div class="auth-form-container">
            <div class="auth-card">
                <!-- Tab Switcher -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab" data-tab="login">เข้าสู่ระบบ</button>
                    <button class="auth-tab" id="registerTab" data-tab="register">สมัครสมาชิก</button>
                    <div class="tab-indicator" id="tabIndicator"></div>
                </div>

                <!-- Login Form -->
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">อีเมล</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="loginEmail" placeholder="example@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">รหัสผ่าน</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="loginPassword" placeholder="กรอกรหัสผ่าน" required>
                            <button type="button" class="toggle-password" id="toggleLoginPw">👁</button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            จดจำฉัน
                        </label>
                        <a href="#" class="forgot-link">ลืมรหัสผ่าน?</a>
                    </div>
                    <!-- Admin Code Toggle -->
                    <div class="admin-code-toggle">
                        <button type="button" class="btn-admin-toggle" id="loginAdminToggle" onclick="var f=document.getElementById('loginAdminField'); f.style.display=f.style.display==='none'?'block':'none';">🔑 เข้าสู่ระบบเป็น Admin</button>
                        <div class="admin-code-field" id="loginAdminField" style="display:none;">
                            <div class="input-wrapper">
                                <span class="input-icon">🛡️</span>
                                <input type="password" id="loginAdminCode" placeholder="กรอกรหัส Admin">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="loginBtn">
                        <span class="btn-text">เข้าสู่ระบบ</span>
                        <span class="btn-loader" style="display:none;"></span>
                    </button>
                </form>

                <!-- Register Form -->
                <form class="auth-form" id="registerForm" style="display: none;">
                    <div class="form-group">
                        <label for="registerName">ชื่อที่แสดง</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="registerName" placeholder="ชื่อของคุณ" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">อีเมล</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="registerEmail" placeholder="example@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">รหัสผ่าน</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="registerPassword" placeholder="อย่างน้อย 6 ตัวอักษร" required
                                minlength="6">
                            <button type="button" class="toggle-password" id="toggleRegPw">👁</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerConfirm">ยืนยันรหัสผ่าน</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="registerConfirm" placeholder="กรอกรหัสผ่านอีกครั้ง" required>
                        </div>
                    </div>
                    <!-- Admin Code Toggle -->
                    <div class="admin-code-toggle">
                        <button type="button" class="btn-admin-toggle" id="registerAdminToggle" onclick="var f=document.getElementById('registerAdminField'); f.style.display=f.style.display==='none'?'block':'none';">🔑 สมัครเป็น Admin</button>
                        <div class="admin-code-field" id="registerAdminField" style="display:none;">
                            <div class="input-wrapper">
                                <span class="input-icon">🛡️</span>
                                <input type="password" id="registerAdminCode" placeholder="กรอกรหัส Admin">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="registerBtn">
                        <span class="btn-text">สมัครสมาชิก</span>
                        <span class="btn-loader" style="display:none;"></span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>หรือ</span>
                </div>

                <!-- Google Sign In -->
                <button class="btn-google" id="googleSignInBtn">
                    <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    เข้าสู่ระบบด้วย Google
                </button>

                <!-- Error/Success Messages -->
                <div class="auth-message" id="authMessage" style="display: none;"></div>

                <!-- Back Link -->
                <div class="auth-back">
                    <a href="index.html">← กลับหน้าแรก</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
